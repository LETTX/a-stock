        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { height: 100%; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #0a0f1a 0%, #1a1f3a 50%, #0f172a 100%);
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at top center, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(236, 72, 153, 0.08) 0%, transparent 40%);
            pointer-events: none;
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .index-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.6) 0%, rgba(51, 65, 85, 0.4) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .text-green { color: #22c55e; }
        .text-red { color: #ef4444; }
        
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .rank-badge {
            width: 16px; height: 16px;
            border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 700; flex-shrink: 0;
        }
        
        .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
        .rank-3 { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; }
        .rank-other { background: rgba(255,255,255,0.08); color: #94a3b8; }
        
        .pulse-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        
        .stock-list {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            min-height: 0;
        }
        
        .stock-item {
            flex-shrink: 1;
            min-height: 0;
        }
    </style>
</head>

    <script>
        lucide.createIcons();

        const REFRESH_INTERVAL = 10000;
        let refreshTimer = null;
        let jsonpCounter = 0;

        const indexConfig = {
            's_sh000001': { id: 'shIndex', name: '上证指数' },
            's_sz399006': { id: 'cyIndex', name: '创业板指' },
            's_sh000688': { id: 'kcIndex', name: '科创50' }
        };

        function formatPrice(price) { return parseFloat(price).toFixed(2); }

        function formatMoney(money) {
            const val = parseFloat(money);
            const absVal = Math.abs(val);
            if (absVal >= 100000000) return (val / 100000000).toFixed(1) + '亿';
            if (absVal >= 10000) return (val / 10000).toFixed(1) + '万';
            return val.toFixed(0);
        }

        function formatPercent(percent) {
            const val = parseFloat(percent);
            const sign = val >= 0 ? '+' : '';
            return sign + val.toFixed(2) + '%';
        }

        function getColorClass(value) { return parseFloat(value) >= 0 ? 'text-red' : 'text-green'; }

        function jsonp(url, callbackParam = 'callback') {
            return new Promise((resolve, reject) => {
                const callbackName = `jsonpCallback_${Date.now()}_${jsonpCounter++}`;
                const script = document.createElement('script');
                window[callbackName] = function(data) { resolve(data); delete window[callbackName]; script.remove(); };
                script.src = url + (url.includes('?') ? '&' : '?') + `${callbackParam}=${callbackName}`;
                script.onerror = function() { reject(new Error('JSONP request failed')); delete window[callbackName]; script.remove(); };
                document.head.appendChild(script);
            });
        }

        function fetchSinaIndices() {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                const codes = Object.keys(indexConfig).join(',');
                script.src = `https://hq.sinajs.cn/list=${codes}`;
                script.charset = 'gbk';
                script.onload = function() {
                    const results = {};
                    for (const code of Object.keys(indexConfig)) {
                        const varName = `hq_str_${code}`;
                        if (window[varName] !== undefined) results[code] = window[varName];
                    }
                    resolve(results);
                    script.remove();
                };
                script.onerror = function() { resolve(null); script.remove(); };
                document.head.appendChild(script);
            });
        }

        function renderIndex(dataStr, config) {
            const parts = dataStr.split(',');
            const price = parts[1] || '0';
            const changePercent = parts[3] || '0';
            const colorClass = getColorClass(changePercent);
            const icon = parseFloat(changePercent) >= 0 ? 'trending-up' : 'trending-down';
            document.getElementById(config.id).innerHTML = `
                <div class="flex flex-col h-full justify-between">
                    <div class="text-[11px] text-gray-400 font-medium">${config.name}</div>
                    <div class="text-base font-bold leading-tight tracking-tight">${formatPrice(price)}</div>
                    <div class="flex items-center gap-0.5 ${colorClass}">
                        <i data-lucide="${icon}" class="w-3 h-3"></i>
                        <span class="text-[11px] font-semibold">${formatPercent(changePercent)}</span>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

            const mockData = [

        function renderSectorList(containerId, data, isInflow) {

                    </div>

        async function fetchSectors() {
            try {
                const inflowUrl = 'https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=5&po=1&np=1&fltt=2&invt=2&ut=b2884a393a59ad64002292a3e90d46a5&fid=f62&fs=m:90+t:3&fields=f12,f14,f2,f3,f62';
                const outflowUrl = 'https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=5&po=0&np=1&fltt=2&invt=2&ut=b2884a393a59ad64002292a3e90d46a5&fid=f62&fs=m:90+t:3&fields=f12,f14,f2,f3,f62';
                const [inflowData, outflowData] = await Promise.all([jsonp(inflowUrl, 'cb'), jsonp(outflowUrl, 'cb')]);
                const inflowList = (inflowData.data?.diff || []).map(item => ({ name: item.f14, money: item.f62, changePercent: item.f3 }));
                const outflowList = (outflowData.data?.diff || []).map(item => ({ name: item.f14, money: Math.abs(item.f62), changePercent: item.f3 }));
                renderSectorList('inflowList', inflowList, true);
                renderSectorList('outflowList', outflowList, false);
            } catch (error) {
                console.error('获取板块数据失败:', error);
                renderMockSectors();
            }
        }

                { code: '600036', name: '招商银行', changePercent: '-0.85', money: '4.27亿', sector: '银行' },
                { code: '603259', name: '药明康德', changePercent: '-2.31', money: '3.89亿', sector: 'CRO' },
                { code: '002415', name: '海康威视', changePercent: '-1.12', money: '3.56亿', sector: '安防' },
                { code: '601888', name: '中国中免', changePercent: '-2.78', money: '3.12亿', sector: '免税' },
                { code: '000002', name: '万科A', changePercent: '-1.56', money: '2.85亿', sector: '房地产' }
            ];
            renderStockList('stockInflowList', inflowMock, true);
            renderStockList('stockOutflowList', outflowMock, false);
        }

        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('updateTime').textContent = `${hours}:${minutes}:${seconds}`;
        }

        async function refreshData() {
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.querySelector('svg').classList.add('animate-spin');
            try {
                const sinaData = await fetchSinaIndices();
                if (sinaData) {
                    for (const [code, config] of Object.entries(indexConfig)) {
                        if (sinaData[code]) renderIndex(sinaData[code], config);
                    }
                } else {
                    renderMockIndices();
                }
                await Promise.all([fetchSectors(), fetchStocks()]);
                updateTime();
            } catch (e) {
                console.error('刷新失败:', e);
                renderMockIndices();
                renderMockSectors();
                renderMockStocks();
            }
            setTimeout(() => { refreshBtn.querySelector('svg').classList.remove('animate-spin'); }, 500);
        }

        document.getElementById('refreshBtn').addEventListener('click', refreshData);

        async function init() {
            await refreshData();
            refreshTimer = setInterval(refreshData, REFRESH_INTERVAL);
        }

        init();
    </script>
</body>
